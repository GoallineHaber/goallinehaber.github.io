name: Haber Güncelleme

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  fetch-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with: node-version: '20'
      - name: Paketleri kur
        run: npm install rss-parser node-fetch@2 cheerio
      - name: Haberleri çek
        run: node scripts/fetch-news.js
      - name: Commit & push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add data/news.json
          git commit -m "Haber güncellendi $(date +'%Y-%m-%d %H:%M')" || echo "No change"
          git push
# trigger fix
