name: Haber Scraper

on:
  schedule:
    - cron: "*/30 * * * *" # her 30 dk
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Repo çek
        uses: actions/checkout@v3

      - name: Node kur
        uses: actions/setup-node@v3
        with:
          node-version: "18"

      - name: Paketleri yükle
        run: npm install

      - name: Chromium yükle
        run: npx puppeteer browsers install chrome

      - name: Scraper çalıştır
        run: node scraper.js

      - name: Commit & push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "news update" || echo "no changes"
          git push
