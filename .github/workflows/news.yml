name: Futbol Haber Botu

on:
  schedule:
    - cron: '0 */3 * * *'   # her 3 saatte çalışır
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Repo indir
        uses: actions/checkout@v3

      - name: Python kur
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Feedparser yükle
        run: pip install feedparser

      - name: Haber botunu çalıştır
        run: python haber_bot.py

      - name: Commit ve Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Yeni futbol haberleri eklendi" || echo "Değişiklik yok"
          git push
