name: Haber Güncelleme

on:
  schedule:
    - cron: '0 * * * *' # her saat başı
  workflow_dispatch:

jobs:
  fetch-news:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Node.js bağımlılıkları
        run: |
          npm install rss-parser node-fetch@2

      - name: Haberleri çek
        run: node scripts/fetch-news.js

      - name: Değişiklikleri commit et
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add data/news.json
          git commit -m "Haberler güncellendi $(date +'%Y-%m-%d %H:%M')" || echo "Değişiklik yok"
          git push
