name: Haber Scraper

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: 18

      - run: npm install

      - name: Chrome kur
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Scraper çalıştır
        run: node scraper.js

      - name: Push
        run: |
          git config user.name "bot"
          git config user.email "bot@github.com"
          git add .
          git commit -m "update news" || echo "no change"
          git push
