name: Fetch News

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Repo çek
        uses: actions/checkout@v4

      - name: Node kur
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Paketleri yükle
        run: npm install node-fetch@2 cheerio

      - name: Script çalıştır
        run: node scripts/fetch-news.js

      - name: Commit at
        run: |
          git config user.name "bot"
          git config user.email "bot@example.com"
          git add .
          git commit -m "news update" || echo "no changes"
          git push
