name: Futbol Haber Botu

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Repo indir
        uses: actions/checkout@v3

      - name: Python kur
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Gereken paketleri yükle
        run: pip install -r requirements.txt

      - name: Botu çalıştır
        run: python haber_bot.py

      - name: Değişiklikleri gönder
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@github.com"
          git add .
          git commit -m "Yeni haberler eklendi" || echo "Değişiklik yok"
          git push
