name: Otomatik Futbol Haberleri

on:
  schedule:
    - cron: '0 */3 * * *'  
  push:
    branches:
      - main

jobs:
  update_news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Kur Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11
      - name: feedparser yükle
        run: pip install feedparser
      - name: Haber Botu Çalıştır
        run: python haber_bot.py
      - name: Commit ve Push
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Yeni futbol haberleri eklendi"
          git push
