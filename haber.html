<!DOCTYPE html>

<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Haber Detay</title>

<style>
body {
  font-family: Arial;
  max-width: 800px;
  margin: auto;
  line-height: 1.7;
  padding: 20px;
}

img {
  width: 100%;
  border-radius: 8px;
  margin: 15px 0;
}

h1 {
  font-size: 28px;
}

#date {
  color: gray;
  font-size: 14px;
}

#summary {
  margin-top: 20px;
  font-size: 17px;
  white-space: pre-line; /* 🔥 EN ÖNEMLİ */
}

a {
  color: #0066cc;
  text-decoration: none;
}

a:hover {
  text-decoration: underline;
}
</style>

</head>

<body>

<h1 id="title"></h1>
<img id="image">
<p id="date"></p>

<div id="summary"></div>

<br>

<a id="source" target="_blank"></a>

<script>
const params = new URLSearchParams(window.location.search);
const url = params.get("url");

async function loadNews() {
  const res = await fetch("./data/news.json");
  const data = await res.json();

  let found = null;

  Object.keys(data).forEach(cat => {
    data[cat].forEach(n => {
      if (n.link === url) found = n;
    });
  });

  if (found) {

    document.getElementById("title").innerText = found.title || "Başlıksız Haber";

    document.getElementById("date").innerText =
      new Date(found.date).toLocaleString() || "";

   document.getElementById("summary").innerText =
  found.summary.replace("devamını oku", "") || "İçerik yok";

    document.getElementById("image").src =
      found.image || "fallback.jpg";

    document.getElementById("source").href =
      found.link || "#";

    document.getElementById("source").innerText =
      found.link ? "Haberi Kaynağında Görüntüle" : "";

  } else {
    document.body.innerHTML = "Haber bulunamadı";
  }
}

loadNews();
</script>

</body>
</html>
