<!DOCTYPE html>

<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Haber Detay</title>
<style>
body { font-family:Arial; max-width:800px; margin:auto; line-height:1.6; }
img { width:100%; border-radius:8px; margin:10px 0; }
a { color:#0066cc; text-decoration:none; }
a:hover { text-decoration:underline; }
button {
  padding:10px 15px;
  background:#111;
  color:white;
  border:none;
  cursor:pointer;
  border-radius:5px;
}
button:hover {
  background:#c00;
}
</style>
</head>
<body>

<h1 id="title"></h1>
<img id="image">
<p id="date"></p>

<p id="summary"></p>

<p id="content" style="display:none"></p>

<br>
<button onclick="showFull()">Devamını oku</button>

<br><br> <a id="source" target="_blank">Haberi Kaynağında Görüntüle</a>

<script>
const params=new URLSearchParams(window.location.search);
const url=params.get("url");

async function loadNews(){
  const res=await fetch("./data/news.json");
  const data=await res.json();
  let found=null;

  Object.keys(data).forEach(cat=>{
    data[cat].forEach(n=>{
      if(n.link===url) found=n;
    });
  });

  if(found){
    document.getElementById("title").innerText=found.title||"Başlıksız Haber";
    document.getElementById("date").innerText=new Date(found.date).toLocaleString()||"";
    
    document.getElementById("summary").innerHTML=(found.summary||"İçerik yok").replace(/\n/g,"<br>");
    
    document.getElementById("content").innerHTML=(found.content||"").replace(/\n/g,"<br>");

    document.getElementById("image").src=found.image||"fallback.jpg";
    document.getElementById("source").href=found.link||"#";
    document.getElementById("source").innerText=found.link?"Haberi Kaynağında Görüntüle":"";
  } else {
    document.body.innerHTML="Haber bulunamadı";
  }
}

function showFull(){
  const content = document.getElementById("content");
  const summary = document.getElementById("summary");

  // 🔥 FIX: içerik boşsa kaybolma bug'ını engeller
  if(!content.innerHTML.trim()){
    alert("Tam içerik yüklenemedi.");
    return;
  }

  summary.style.display="none";
  content.style.display="block";
}

loadNews();
</script>

</body>
</html>
