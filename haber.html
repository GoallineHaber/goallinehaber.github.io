<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Haber</title>
<style>
body { font-family: Arial, sans-serif; margin: 20px; }
</style>
</head>
<body>
<div id="content">Haber yükleniyor...</div>

<script>
// URL'den parametreyi al
const params = new URLSearchParams(window.location.search);
const url = params.get('url');

if(url) {
    document.getElementById('content').innerHTML = <iframe src="${url}" style="width:100%; height:90vh; border:none;"></iframe>;
} else {
    document.getElementById('content').innerText = "Haber bulunamadı!";
}
</script>
</body>
</html>
