<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>GoallineHaber</title>

<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js"></script>

<style>
body { font-family: Arial; background:#f5f5f5; margin:20px; }

.site-header { background:#c00; padding:30px; color:white; font-size:26px; text-align:center; }

.navbar { background:#222; padding:10px; text-align:center; border-radius:5px; margin-bottom:15px;}
.navbar a { color:white; margin:0 15px; cursor:pointer; }

.team-bar { text-align:center; margin-bottom:10px; }
.team-bar img { width:45px; margin:0 10px; cursor:pointer; }

.main-layout { display:grid; grid-template-columns:3fr 1fr; gap:25px; }

.manset-slider img { width:100%; max-height:400px; object-fit:cover; border-radius:10px; }
.manset-title { font-size:26px; font-weight:bold; }

#all-news { display:block; }

.row { display:flex; gap:10px; margin-bottom:15px; }

.news-item { background:white; padding:10px; border-radius:10px; flex:1; }
.news-item img { width:100%; height:180px; object-fit:cover; }

.big { width:100%; }
.big img { height:300px; }

.sidebar { background:white; padding:15px; border-radius:8px; }

.pagination { text-align:center; margin-top:20px; }
.pagination button { margin:3px; padding:6px 10px; }
</style>
</head>

<body>

<div class="site-header">GoallineHaber</div>

<!-- TAKIM LOGOLARI -->
<div class="team-bar">
  <img src="https://upload.wikimedia.org/wikipedia/tr/2/20/Galatasaray_Sports_Club_Logo.svg" onclick="filterTeam('galatasaray')">
  <img src="https://upload.wikimedia.org/wikipedia/tr/8/86/Fenerbah%C3%A7e_SK.svg" onclick="filterTeam('fenerbahce')">
  <img src="https://upload.wikimedia.org/wikipedia/tr/3/3f/Be%C5%9Fikta%C5%9F_JK_logo.svg" onclick="filterTeam('besiktas')">
  <img src="https://upload.wikimedia.org/wikipedia/tr/0/0c/Trabzonspor_Logo.svg" onclick="filterTeam('trabzonspor')">
</div>

<div class="navbar">
  <a onclick="filterCategory('futbol')">Futbol</a>
  <a onclick="filterCategory('basketbol')">Basketbol</a>
  <a onclick="filterCategory('voleybol')">Voleybol</a>
  <a onclick="filterCategory('diger')">Diğer</a>
  <a onclick="filterCategory('all')">Tümü</a>
</div>

<div class="manset-slider"><div id="manset"></div></div>

<div class="main-layout">

  <div>
    <h1>Son Haberler</h1>
    <div id="all-news"></div>
    <div class="pagination" id="pagination"></div>
  </div>

  <div class="sidebar">
    <h3>⚽ Süper Lig</h3>
    <iframe src="https://www.tff.org/default.aspx?pageID=198" height="350"></iframe>
  </div>

</div>

<script>
let allNews=[], filteredNews=[], currentIndex=0, page=1;
const perPage=12;

/* 🔥 DAHA GÜÇLÜ KATEGORİ */
function normalize(t){
 return t.toLowerCase()
  .replace(/ç/g,"c").replace(/ş/g,"s")
  .replace(/ğ/g,"g").replace(/ü/g,"u")
  .replace(/ö/g,"o").replace(/ı/g,"i");
}

function getCategory(n){
 const t=normalize(n.title+n.summary);

 if(/galatasaray|fenerbahce|besiktas|trabzonspor|gol|mac|lig/.test(t)) return "futbol";
 if(/nba|basket/.test(t)) return "basketbol";
 if(/voleybol|file/.test(t)) return "voleybol";
 return "diger";
}

/* TEAM */
function filterTeam(team){
 filteredNews=allNews.filter(n=>normalize(n.title+n.summary).includes(team));
 page=1; render();
}

/* CATEGORY */
function filterCategory(cat){
 if(cat==="all") filteredNews=[...allNews];
 else filteredNews=allNews.filter(n=>getCategory(n)===cat);
 page=1; render();
}

/* RENDER */
function render(){
 const start=(page-1)*perPage;
 const data=filteredNews.slice(start,start+perPage);
 let html="";

 for(let i=0;i<data.length;i+=6){

  // 3 küçük
  html+=`<div class="row">`;
  for(let j=i;j<i+3 && data[j];j++){
    html+=card(data[j]);
  }
  html+=`</div>`;

  // 1 büyük
  if(data[i+3]) html+=`<div class="row">${card(data[i+3],true)}</div>`;

  // 2 küçük
  html+=`<div class="row">`;
  for(let j=i+4;j<i+6 && data[j];j++){
    html+=card(data[j]);
  }
  html+=`</div>`;
 }

 document.getElementById("all-news").innerHTML=html;
 renderPagination();
}

function card(n,big=false){
 return `
 <div class="news-item ${big?'big':''}">
   <img src="${n.image}">
   <h3>${n.title}</h3>
 </div>`;
}

/* PAGINATION */
function renderPagination(){
 let total=Math.ceil(filteredNews.length/perPage);
 let html="";
 for(let i=1;i<=total;i++){
  html+=`<button onclick="goPage(${i})">${i}</button>`;
 }
 document.getElementById("pagination").innerHTML=html;
}

function goPage(p){ page=p; render(); }

/* MANSET AYNI */
function loadManset(){
 setInterval(()=>{
  const n=allNews[currentIndex];
  document.getElementById("manset").innerHTML=`
   <img src="${n.image}">
   <div class="manset-title">
    <a href="haber.html?url=${encodeURIComponent(n.link)}">${n.title}</a>
   </div>`;
  currentIndex=(currentIndex+1)%allNews.length;
 },4000);
}

/* LOAD */
async function loadNews(){
 const res=await fetch("./data/news.json");
 const data=await res.json();

 allNews=[];
 Object.keys(data).forEach(cat=>{
  data[cat].forEach(n=>{
    n.category=cat;
    allNews.push(n);
  });
 });

 allNews.sort((a,b)=>new Date(b.date)-new Date(a.date));

 filteredNews=[...allNews];
 render();
 loadManset();
}

loadNews();
</script>

</body>
</html>
