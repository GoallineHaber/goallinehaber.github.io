<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>𝐺𝑜𝑎𝑙𝑙𝑖𝑛𝑒𝐻𝑎𝑏𝑒𝑟</title>
<link rel="stylesheet" href="style.css">
<style>
  body { font-family: Arial, sans-serif; background: #f5f5f5; margin: 20px; }
  a { color: #0066cc; text-decoration: none; }
  a:hover { text-decoration: underline; }
  .site-header { background-color: #c00; width: 100%; padding: 30px 25px; box-sizing: border-box; }
  .site-title { color: white; font-weight: bold; font-family: 'Arial Black', Arial, sans-serif; font-size: 26px; }
  .navbar { background: #222; padding: 10px 20px; text-align: center; border-radius: 5px; margin-bottom: 20px; }
  .navbar a { color: white; margin: 0 15px; text-decoration: none; font-weight: bold; font-size: 16px; cursor: pointer; }
  .navbar a:hover { text-decoration: underline; }
  .main-layout { display: grid; grid-template-columns: 3fr 1fr; gap: 25px; margin-top: 20px; }
  .news-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
  .news-item { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
  .news-item img { width: 90%; height: auto; border-radius: 7px; display: block; margin-bottom: 10px; }
  .news-item h2 { font-size: 20px; margin: 0 0 5px 0; }
  .news-item p { color: #555; font-size: 0.95em; margin: 0; }
  .news-item.big { grid-column: span 2; }
  .sidebar { background: white; padding: 15px; border-radius: 8px; height: fit-content; }
  .side-news { padding: 8px 0; border-bottom: 1px solid #eee; }
  .side-news a { color: #222; font-weight: bold; }
</style>
</head>
<body>

<div class="site-header">
  <span class="site-title">𝐺𝑜𝑎𝑙𝑙𝑖𝑛𝑒𝐻𝑎𝑏𝑒𝑟</span>
</div>

<div class="navbar">
  <a onclick="filterCategory('futbol')">Futbol</a>
  <a onclick="filterCategory('basketbol')">Basketbol</a>
  <a onclick="filterCategory('voleybol')">Voleybol</a>
  <a onclick="filterCategory('diger')">Diğer</a>
  <a onclick="filterCategory('all')">Tümü</a>
</div>

<div class="main-layout">
  <div>
    <h1>Son Haberler</h1>
    <div id="all-news" class="news-container"></div>
  </div>

  <div class="sidebar">
    <h3>🔥 En Çok Okunanlar</h3>
    <div class="side-news">
      <a href="ronaldo.html">Ronaldo yeni rekor kırdı</a>
    </div>
    <div class="side-news">
      <a href="world-cup.html">Iran'ın Dünya kupası Tehlike'de!</a>
    </div>
  </div>
</div>

<script>
// Haberleri çek
fetch("/data/news.json")
  .then(res => res.json())
  .then(data => {
    const container = document.getElementById("all-news");
    const allNews = [];

    ["futbol","basketbol","uefa","voleybol","diger"].forEach(cat => {
      (data[cat] || []).forEach(n => {
        n.category = cat;
        allNews.push(n);
      });
    });

    allNews.sort(() => Math.random() - 0.5);

    const now = new Date();
    const recentNews = allNews.filter(n => {
      const newsDate = new Date(n.date);
      return (now - newsDate) < 48*60*60*1000;
    });

    recentNews.forEach(n => {
      const div = document.createElement("div");
      div.className = "news-item";
      div.innerHTML = `
        <h2>[${n.category.toUpperCase()}] 
          <a href="#" onclick="openHaber('${encodeURIComponent(n.link)}')">${n.title}</a>
        </h2>
        <p>${new Date(n.date).toLocaleString('tr-TR')}</p>
      `;
      container.appendChild(div);
    });
  })
  .catch(err => console.error("Haberler yüklenemedi:", err));

// Haber açma fonksiyonu
function openHaber(url) {
  window.location.href = `haber.html?url=${url}`;
}

// Kategori filtreleme
function filterCategory(cat) {
  const allNewsDivs = document.querySelectorAll("#all-news .news-item");
  allNewsDivs.forEach(div => {
    if(cat === 'all') {
      div.style.display = "block";
    } else if(div.innerHTML.includes(cat.toUpperCase())) {
      div.style.display = "block";
    } else {
      div.style.display = "none";
    }
  });
}
</script>

</body>
</html>
