<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>GoallineHaber</title>

<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js"></script>

<style>
body { font-family: Arial; background:#eef1f5; margin:0; }

.site-header {
  background:linear-gradient(90deg,#c00,#900);
  padding:25px;
  color:#fff;
  font-size:28px;
  text-align:center;
}

/* TEAM BAR */
.team-bar {
  display:flex;
  justify-content:center;
  gap:25px;
  padding:15px;
  background:#fff;
}

.team img { width:50px; cursor:pointer; transition:.3s; }
.team img:hover { transform:scale(1.15); }

/* NAV */
.navbar { background:#111; padding:12px; text-align:center; }
.navbar a { color:white; margin:0 15px; cursor:pointer; }

/* CONTENT */
.container { padding:20px; }

.manset img {
  width:100%;
  height:350px;
  object-fit:cover;
  border-radius:10px;
}

.manset h2 { margin:10px 0; }

.grid {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:15px;
}

.card {
  background:white;
  padding:10px;
  border-radius:10px;
  box-shadow:0 2px 8px rgba(0,0,0,.1);
}

.card img {
  width:100%;
  height:180px;
  object-fit:cover;
  border-radius:6px;
}

/* PAGINATION */
.pagination {
  text-align:center;
  margin:20px 0;
}

.pagination button {
  padding:8px 12px;
  margin:3px;
  border:none;
  background:#222;
  color:white;
  cursor:pointer;
}

.sidebar {
  background:white;
  padding:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="site-header">GoallineHaber</div>

<!-- 🔥 LOGOLAR DÜZELTİLDİ -->
<div class="team-bar">
  <div class="team"><img src="https://logos-world.net/wp-content/uploads/2020/06/Galatasaray-Logo.png" onclick="filterTeam('galatasaray')"></div>
  <div class="team"><img src="https://logos-world.net/wp-content/uploads/2020/06/Fenerbahce-Logo.png" onclick="filterTeam('fenerbahce')"></div>
  <div class="team"><img src="https://logos-world.net/wp-content/uploads/2020/06/Besiktas-Logo.png" onclick="filterTeam('besiktas')"></div>
  <div class="team"><img src="https://logos-world.net/wp-content/uploads/2020/06/Trabzonspor-Logo.png" onclick="filterTeam('trabzonspor')"></div>
</div>

<div class="navbar">
  <a onclick="filterCategory('futbol')">Futbol</a>
  <a onclick="filterCategory('basketbol')">Basketbol</a>
  <a onclick="filterCategory('voleybol')">Voleybol</a>
  <a onclick="filterCategory('diger')">Diğer</a>
  <a onclick="filterCategory('all')">Tümü</a>
</div>

<div class="container">

<div id="content"></div>

<div class="pagination" id="pagination"></div>

</div>

<script>
let allNews=[], filteredNews=[], page=1;
const perPage=9;

/* 🔥 GÜÇLÜ KATEGORİ FIX */
function normalize(text){
  return text.toLowerCase()
    .replace(/ç/g,"c").replace(/ş/g,"s")
    .replace(/ğ/g,"g").replace(/ü/g,"u")
    .replace(/ö/g,"o").replace(/ı/g,"i");
}

function strongCategory(n){
  const t=normalize(n.title+" "+n.summary);

  if(/galatasaray|fenerbahce|besiktas|trabzonspor|gol|mac|lig/.test(t))
    return "futbol";

  if(/nba|basket|euroleague/.test(t))
    return "basketbol";

  if(/voleybol|smaç|file/.test(t))
    return "voleybol";

  return "diger";
}

/* TEAM FILTER */
function filterTeam(team){
  filteredNews = allNews.filter(n=>{
    return normalize(n.title+n.summary).includes(team);
  });
  page=1;
  render();
}

/* CATEGORY FILTER */
function filterCategory(cat){
  if(cat==="all") filteredNews=[...allNews];
  else filteredNews=allNews.filter(n=>strongCategory(n)===cat);
  page=1;
  render();
}

/* RENDER */
function render(){
  const start=(page-1)*perPage;
  const data=filteredNews.slice(start,start+perPage);

  let html="";

  for(let i=0;i<data.length;i+=4){

    // 3 küçük
    html+=`<div class="grid">`;
    for(let j=i;j<i+3 && data[j];j++){
      const n=data[j];
      html+=`
      <div class="card">
        <img src="${n.image}">
        <h3>${n.title}</h3>
      </div>`;
    }
    html+=`</div>`;

    // 1 büyük manset
    if(data[i+3]){
      const n=data[i+3];
      html+=`
      <div class="manset">
        <img src="${n.image}">
        <h2>${n.title}</h2>
      </div>`;
    }
  }

  document.getElementById("content").innerHTML=html;
  renderPagination();
}

/* PAGINATION */
function renderPagination(){
  const total=Math.ceil(filteredNews.length/perPage);
  let html="";
  for(let i=1;i<=total;i++){
    html+=`<button onclick="goPage(${i})">${i}</button>`;
  }
  document.getElementById("pagination").innerHTML=html;
}

function goPage(p){ page=p; render(); }

/* LOAD */
async function loadNews(){
  const res=await fetch("./data/news.json");
  const data=await res.json();

  allNews=[];
  Object.keys(data).forEach(cat=>{
    data[cat].forEach(n=>allNews.push(n));
  });

  allNews.sort((a,b)=>new Date(b.date)-new Date(a.date));

  filteredNews=[...allNews];
  render();
}

loadNews();
</script>

</body>
</html>
