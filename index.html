<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>GoallineHaber</title>

<!-- ADSENSE -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js"></script>

<style>
body { font-family: Arial; background: #f5f5f5; margin: 20px; }
a { color: #0066cc; text-decoration:none; }
a:hover { text-decoration:underline; }
.site-header { background:#c00; padding:30px; color:white; font-size:26px; font-weight:bold; }
.navbar { background:#222; padding:10px; text-align:center; border-radius:5px; margin-bottom:20px;}
.navbar a { color:white; margin:0 15px; font-weight:bold; cursor:pointer; }
.main-layout { display:grid; grid-template-columns:3fr 1fr; gap:25px; }
.manset-slider img { width:100%; max-height:400px; object-fit:cover; border-radius:10px; }
.manset-title { font-size:28px; font-weight:bold; margin-top:10px; }
#all-news { display:grid; grid-template-columns:repeat(auto-fill, minmax(280px,1fr)); gap:15px; }
.news-item { background:white; padding:10px; border-radius:10px; transition:0.3s; }
.news-item:hover { transform:scale(1.03); }
.news-item img { width:100%; height:200px; object-fit:cover; }
.news-item h2 { font-size:18px; }
.news-item p {
  font-size:14px;
  color:#444;

  display: -webkit-box;
  -webkit-line-clamp: 5; /* kaç satır istiyorsan */
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.sidebar { background:white; padding:15px; border-radius:8px; }
iframe { width:100%; border:none; }
</style>
</head>
<body>

<div class="site-header">GoallineHaber</div>

<div class="navbar">
  <a onclick="filterCategory('futbol')">Futbol</a>
  <a onclick="filterCategory('basketbol')">Basketbol</a>
  <a onclick="filterCategory('voleybol')">Voleybol</a>
  <a onclick="filterCategory('diger')">Diğer</a>
  <a onclick="filterCategory('all')">Tümü</a>
</div>

<div style="margin:20px 0; text-align:center;">
  <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-XXXX" data-ad-slot="XXXX" data-ad-format="auto"></ins>
</div>

<div class="manset-slider"><div id="manset"></div></div>

<div class="main-layout">

  <div>
    <h1>Son Haberler</h1>
    <div id="all-news"></div>
  </div>

  <div class="sidebar">
    <h3>⚽ Süper Lig</h3>
    <iframe src="https://www.tff.org/default.aspx?pageID=198" height="350"></iframe>
  </div>

</div>

<script>
let allNews=[], currentIndex=0;

function renderNews(category){
  const container=document.getElementById("all-news");
  container.innerHTML="";
  allNews.forEach(n=>{
    if(category!=="all" && n.category!==category) return;
    const div=document.createElement("div");
    div.className="news-item";
    div.innerHTML=`
      <img src="${n.image}">
      <h2><a href="haber.html?url=${encodeURIComponent(n.link)}">${n.title}</a></h2>
     <p>${(n.summary ? n.summary.split("\n").slice(0,3).join(" ") + "..." : "İçerik yüklenemedi")}</p>
      <small>${new Date(n.date).toLocaleString()}</small>
    `;
    container.appendChild(div);
  });
  (adsbygoogle=window.adsbygoogle||[]).push({});
}

function loadManset(){
  if(allNews.length===0) return;
  setInterval(()=>{
    const n=allNews[currentIndex];
    document.getElementById("manset").innerHTML=`
      <img src="${n.image}">
      <div class="manset-title"><a href="haber.html?url=${encodeURIComponent(n.link)}">${n.title}</a></div>
    `;
    currentIndex++;
    if(currentIndex>=allNews.length) currentIndex=0;
  },4000);
}

function filterCategory(cat){ renderNews(cat); }

async function loadNews(){
  const res=await fetch("./data/news.json");
  const data=await res.json();
  allNews=[];
  Object.keys(data).forEach(cat=>{
    (data[cat]||[]).forEach(n=>{
      n.category=cat;
      allNews.push(n);
    });
  });
  allNews.sort((a,b)=>new Date(b.date)-new Date(a.date));
  renderNews("all");
  loadManset();
}
loadNews();
</script>

</body>
</html>
