<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Haber Detay</title>

<style>
body { font-family: Arial; background:#eef1f5; margin:0; }

.container {
    max-width:900px;
    margin:auto;
    background:white;
    padding:20px;
}

img {
    width:100%;
    border-radius:10px;
}

h1 {
    font-size:26px;
}

p {
    font-size:16px;
    line-height:1.6;
}
</style>
</head>

<body>

<div class="container">
    <div id="content">Yükleniyor...</div>
</div>

<script>
async function load(){
    const params = new URLSearchParams(window.location.search);
    const link = params.get("link");

    const res = await fetch("./data/news.json");
    const data = await res.json();

    let found = null;

    Object.keys(data).forEach(cat=>{
        data[cat].forEach(n=>{
            if(n.link === link){
                found = n;
            }
        });
    });

    if(!found){
        document.getElementById("content").innerHTML = "Haber bulunamadı";
        return;
    }

    document.getElementById("content").innerHTML = `
        <h1>${found.title}</h1>
        <img src="${found.image}">
        <p>${found.content || found.summary}</p>
    `;
}

load();
</script>

</body>
</html>
