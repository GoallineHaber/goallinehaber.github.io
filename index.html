<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>GoallineHaber</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: linear-gradient(120deg, #f5f5f5, #eaeaea);
  margin: 20px;
}

a {
  color: #0066cc;
  text-decoration: none;
}

a:hover {
  text-decoration: underline;
}

.site-header {
  background-color: #c00;
  width: 100%;
  padding: 30px 25px;
  box-sizing: border-box;
}

.site-title {
  color: white;
  font-weight: bold;
  font-size: 26px;
}

.navbar {
  background: #222;
  padding: 10px;
  text-align: center;
  border-radius: 5px;
  margin-bottom: 20px;
}

.navbar a {
  color: white;
  margin: 0 15px;
  font-weight: bold;
  cursor: pointer;
}

.navbar a:hover {
  text-decoration: underline;
}

.main-layout {
  display: grid;
  grid-template-columns: 3fr 1fr;
  gap: 25px;
}

.manset-slider img {
  width: 100%;
  max-height: 400px;
  object-fit: cover;
  border-radius: 10px;
}

.manset-title {
  font-size: 28px;
  font-weight: bold;
  margin-top: 10px;
}

#all-news {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 15px;
}

.news-item {
  background: white;
  padding: 10px;
  border-radius: 10px;
  transition: 0.3s;
}

.news-item:hover {
  transform: scale(1.03);
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

.news-item img {
  width: 100%;
  height: 200px;
  object-fit: cover;
  border-radius: 6px;
}

.news-item h2 {
  font-size: 18px;
}

.news-item.big {
  grid-column: span 2;
}

.sidebar {
  background: white;
  padding: 15px;
  border-radius: 8px;
}

.side-news {
  padding: 8px 0;
  border-bottom: 1px solid #eee;
}

iframe {
  width: 100%;
  border: none;
  border-radius: 6px;
}

@media (max-width: 768px) {
  .main-layout {
    grid-template-columns: 1fr;
  }
  .news-item.big {
    grid-column: span 1;
  }
}
</style>
</head>

<body>

<div class="site-header">
  <span class="site-title">GoallineHaber</span>
</div>

<div class="navbar">
  <a onclick="filterCategory('futbol')">Futbol</a>
  <a onclick="filterCategory('basketbol')">Basketbol</a>
  <a onclick="filterCategory('voleybol')">Voleybol</a>
  <a onclick="filterCategory('diger')">Diğer</a>
  <a onclick="filterCategory('all')">Tümü</a>
</div>

<!-- Manşet -->
<div class="manset-slider">
  <div id="manset"></div>
</div>

<div class="main-layout">

  <!-- Haberler -->
  <div>
    <h1>Son Haberler</h1>
    <div id="all-news"></div>
  </div>

  <!-- Sidebar -->
  <div class="sidebar">
    <h3>⚽ Süper Lig</h3>
    <iframe src="https://www.tff.org/default.aspx?pageID=198" height="350"></iframe>

    <h3>🔥 En Çok Okunanlar</h3>
    <div class="side-news">
      <a href="ronaldo.html">Ronaldo yeni rekor kırdı</a>
    </div>
    <div class="side-news">
      <a href="world-cup.html">Dünya kupası haberleri</a>
    </div>
  </div>

</div>

<script>
let allNews = [];
let currentIndex = 0;

/* HABERLERİ ÇİZ */
function renderNews(category){
  const container = document.getElementById("all-news");
  container.innerHTML = "";

  let count = 0;

  allNews.forEach(n => {

    if(category !== "all" && n.category !== category) return;

    const div = document.createElement("div");
    div.className = "news-item";

    if(count % 5 === 0) div.classList.add("big");

    div.innerHTML = `
      ${n.image ? `<img src="${n.image}">` : ""}
      <h2><a href="haber.html?url=${encodeURIComponent(n.link)}">${n.title}</a></h2>
      <p>${new Date(n.date).toLocaleString()}</p>
    `;

    container.appendChild(div);
    count++;
  });
}

/* MANŞET SLIDER */
function loadManset(){
  if(allNews.length === 0) return;

  setInterval(() => {
    const n = allNews[currentIndex];

    document.getElementById("manset").innerHTML = `
      ${n.image ? `<img src="${n.image}">` : ""}
      <div class="manset-title">
        <a href="haber.html?url=${encodeURIComponent(n.link)}">${n.title}</a>
      </div>
    `;

    currentIndex++;
    if(currentIndex >= allNews.length) currentIndex = 0;

  }, 4000);
}

/* KATEGORİ */
function filterCategory(cat){
  renderNews(cat);
}

/* HABER YÜKLE */
async function loadNews(){
  const res = await fetch("./data/news.json");
  const data = await res.json();

  allNews = [];

  Object.keys(data).forEach(cat => {
    (data[cat] || []).forEach(n => {
      n.category = cat;
      allNews.push(n);
    });
  });

  allNews.sort((a,b) => new Date(b.date) - new Date(a.date));

  renderNews("all");
  loadManset();
}

loadNews();
</script>

</body>
</html>
