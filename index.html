<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>GoallineHaber</title>

<!-- ADSENSE -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2722371260942185" crossorigin="anonymous"></script>

<style>
body { font-family: Arial; background: #eef1f5; margin: 0; }

.site-header {
  background: linear-gradient(90deg,#c00,#900);
  padding:25px;
  color:white;
  font-size:30px;
  font-weight:bold;
  text-align:center;
}

.team-bar {
  display:flex;
  justify-content:center;
  gap:25px;
  padding:15px;
  background:white;
}

.team { text-align:center; cursor:pointer; transition:0.3s; }
.team img { width:55px; height:55px; }
.team:hover { transform:scale(1.1); }

.navbar { background:#111; padding:12px; text-align:center; }
.navbar a { color:white; margin:0 15px; font-weight:bold; cursor:pointer; }

.container { padding:20px; }

.main-layout {
  display:grid;
  grid-template-columns:3fr 1fr;
  gap:25px;
}

#all-news {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:18px;
}

.news-item {
  background:white;
  padding:12px;
  border-radius:12px;
}

.news-item img {
  width:100%;
  height:200px;
  object-fit:cover;
}
</style>
</head>

<body>

<div class="site-header">GoallineHaber</div>

<div class="team-bar">
  <div class="team" onclick="filterTeam('galatasaray')">
    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/20/Galatasaray_Sports_Club_Logo.svg/120px-Galatasaray_Sports_Club_Logo.svg.png">
    <div>GS</div>
  </div>
</div>

<div class="navbar">
  <a onclick="filterCategory('futbol')">Futbol</a>
  <a onclick="filterCategory('all')">Tümü</a>
</div>

<div class="container">
  <div id="all-news"></div>
</div>

<script>
let allNews = [];
let currentPage = 1;
const perPage = 12;

function renderNews(category){
  const container = document.getElementById("all-news");
  container.innerHTML = "";

  let filtered = allNews.filter(n => category==="all" || n.category===category);

  filtered.slice(0, perPage).forEach(n=>{
    const div = document.createElement("div");
    div.className = "news-item";

    div.innerHTML = `
      <img src="${n.image}">
      <h2>
        <a href="haber.html?url=${encodeURIComponent(n.link)}">${n.title}</a>
      </h2>
      <p>${n.summary}</p>
    `;

    container.appendChild(div);
  });
}

function filterCategory(cat){
  renderNews(cat);
}

async function loadNews(){
  const res = await fetch("./data/news.json");
  const data = await res.json();

  allNews = [];

  Object.keys(data).forEach(cat=>{
    data[cat].forEach(n=>{
      n.category = cat;
      allNews.push(n);
    });
  });

  renderNews("all");
}

loadNews();
</script>

</body>
</html>
