<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>𝐺𝑜𝑎𝑙𝑙𝑖𝑛𝑒𝐻𝑎𝑏𝑒𝑟</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="site-header">
  <span class="site-title">𝐺𝑜𝑎𝑙𝑙𝑖𝑛𝑒𝐻𝑎𝑏𝑒𝑟</span>
</div>

<div class="navbar">
  <a onclick="filterCategory('futbol')">Futbol</a>
  <a onclick="filterCategory('basketbol')">Basketbol</a>
  <a onclick="filterCategory('uefa')">UEFA</a>
  <a onclick="filterCategory('voleybol')">Voleybol</a>
  <a onclick="filterCategory('diger')">Diğer</a>
  <a onclick="filterCategory('all')">Tümü</a>
</div>

<div class="main-layout">
  <div>
    <h1>Son Haberler</h1>
    <div id="all-news" class="news-container"></div>
  </div>

  <div class="sidebar">
    <h3>🔥 En Çok Okunanlar</h3>
    <div class="side-news">
      <a href="ronaldo.html">Ronaldo yeni rekor kırdı</a>
    </div>
    <div class="side-news">
      <a href="world-cup.html">Iran'ın Dünya kupası Tehlike'de!</a>
    </div>
  </div>
</div>

<script>
fetch("/data/news.json")
  .then(res => res.json())
  .then(data => {
    const container = document.getElementById("all-news");
    const allNews = [];

    ["futbol","basketbol","uefa","voleybol","diger"].forEach(cat => {
      (data[cat] || []).forEach(n => {
        n.category = cat;
        allNews.push(n);
      });
    });

    
    allNews.sort(() => Math.random() - 0.5);

    
    const now = new Date();
    const recentNews = allNews.filter(n => {
      const newsDate = new Date(n.date);
      return (now - newsDate) < 48*60*60*1000;
    });

    
    recentNews.forEach(n => {
      const div = document.createElement("div");
      div.className = "news-item";
      div.innerHTML = `
        <h2>[${n.category.toUpperCase()}] <a href="${n.link}" target="_blank">${n.title}</a></h2>
        <p>${new Date(n.date).toLocaleString('tr-TR')}</p>
      `;
      container.appendChild(div);
    });
  })
  .catch(err => console.error("Haberler yüklenemedi:", err));



function filterCategory(cat) {
  const allNewsDivs = document.querySelectorAll("#all-news .news-item");
  allNewsDivs.forEach(div => {
    if(cat === 'all') {
      div.style.display = "block";
    } else if(div.innerHTML.includes(`[${cat.toUpperCase()}]`)) {
      div.style.display = "block";
    } else {
      div.style.display = "none";
    }
  });
}
</script>

</body>
</html>
